<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JJ Judejush Stores | POS</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 font-sans">
    
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-slate-900 text-white flex flex-col p-6">
            <div class="mb-10 flex items-center gap-3">
                <div class="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center font-black text-xl">JJ</div>
                <div>
                    <h1 class="text-sm font-black tracking-tight leading-none">JUDEJUSH</h1>
                    <p class="text-[9px] font-bold text-emerald-400 opacity-80 uppercase tracking-widest mt-1">POS System</p>
                </div>
            </div>

            <nav class="space-y-2 flex-1">
                <a href="#" class="flex items-center gap-3 p-4 bg-emerald-500 text-white rounded-2xl text-[11px] font-black uppercase tracking-widest transition-all">
                    <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard
                </a>
                <a href="#" class="flex items-center gap-3 p-4 text-slate-400 hover:text-white rounded-2xl text-[11px] font-black uppercase tracking-widest transition-all">
                    <i data-lucide="shopping-cart" class="w-4 h-4"></i> Sales (POS)
                </a>
                <a href="#" class="flex items-center gap-3 p-4 text-slate-400 hover:text-white rounded-2xl text-[11px] font-black uppercase tracking-widest transition-all">
                    <i data-lucide="package" class="w-4 h-4"></i> Inventory
                </a>
            </nav>

            <div class="pt-6 border-t border-slate-800">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-slate-700"></div>
                    <div class="text-[10px]">
                        <p class="font-black">Admin User</p>
                        <p class="text-slate-500">Super Admin</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex overflow-hidden">
            <!-- Products Grid -->
            <section class="flex-1 flex flex-col p-8 overflow-hidden">
                <header class="flex justify-between items-end mb-8">
                    <div>
                        <h2 class="text-2xl font-black text-slate-900">Station Terminal</h2>
                        <p class="text-xs text-slate-400 font-bold uppercase tracking-widest mt-1">Main Branch | Active</p>
                    </div>
                    <div class="flex gap-4">
                        <div class="relative">
                            <i data-lucide="search" class="w-4 h-4 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                            <input type="text" placeholder="Search product..." class="bg-white border border-slate-200 rounded-2xl pl-11 pr-6 py-3 text-xs font-bold focus:outline-none focus:ring-2 focus:ring-emerald-500/20 w-64">
                        </div>
                    </div>
                </header>

                <div id="product-grid" class="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 overflow-y-auto pr-2">
                    <!-- Products will be loaded here -->
                </div>
            </section>

            <!-- Cart / Checkout Pane -->
            <section class="w-96 bg-white border-l border-slate-200 flex flex-col shadow-2xl z-10">
                <div class="p-6 border-b border-slate-50">
                    <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest text-center">Current Session</h3>
                </div>

                <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-4">
                    <!-- Cart items will be loaded here -->
                    <div class="text-center py-20 opacity-20">
                        <i data-lucide="shopping-bag" class="w-12 h-12 mx-auto mb-4"></i>
                        <p class="text-[10px] font-black uppercase">No active items</p>
                    </div>
                </div>

                <div class="p-8 bg-slate-50 border-t border-slate-100 space-y-6">
                    <div class="space-y-2">
                        <div class="flex justify-between text-xs font-bold text-slate-400">
                            <span>Subtotal</span>
                            <span id="subtotal">₱0.00</span>
                        </div>
                        <div class="flex justify-between text-lg font-black text-slate-900 border-t border-slate-200 pt-2">
                            <span>Total Payable</span>
                            <span id="total">₱0.00</span>
                        </div>
                    </div>

                    <button id="checkout-btn" class="w-full py-5 bg-emerald-500 text-white rounded-[24px] text-xs font-black uppercase tracking-[0.2em] shadow-xl shadow-emerald-500/20 hover:bg-emerald-600 transition-all flex items-center justify-center gap-3">
                        PROCESS PAYMENT <i data-lucide="arrow-right" class="w-4 h-4"></i>
                    </button>
                </div>
            </section>
        </main>
    </div>

    <!-- Receipt Modal (hidden by default) -->
    <div id="receipt-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[40px] shadow-2xl overflow-hidden p-10 text-center space-y-6">
            <i data-lucide="check-circle-2" class="w-16 h-16 text-emerald-500 mx-auto"></i>
            <h3 class="text-2xl font-black text-slate-900">SALE COMPLETE</h3>
            <p id="receipt-total" class="text-4xl font-black text-slate-900">₱0.00</p>
            <button onclick="closeModal()" class="w-full py-4 bg-slate-900 text-white rounded-2xl text-[10px] font-black uppercase tracking-widest">Done</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
